<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: rgb(40, 39, 39);
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        header {
            width: 100%;
            background-color: rgb(30, 30, 30);
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
        }
        footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: rgb(30, 30, 30);
            color: white;
            text-align: center;
        }

        nav {
            margin: 80px 0 20px; /* Adjusted margin to account for fixed header */
        }
        nav a {
            margin: 0 15px;
            color: white;
            text-decoration: none;
        }
        main {
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome To Your Webservice!</h1>
    </header>
    <footer>
        <h1>This is The Footer</h1>
        <p>Its a nice footer in my opinion.</p>
    </footer>
</body>
</html>
